name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: melody-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: melody-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: melody-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: melody-macos-aarch64

    steps:
      - uses: actions/checkout@v4
        with:
          path: melody

      - name: Checkout crust
        uses: actions/checkout@v4
        with:
          repository: isene/crust
          path: crust

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linker (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: melody
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        working-directory: melody
        run: |
          cp target/${{ matrix.target }}/release/melody ../${{ matrix.artifact }}
          chmod +x ../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true
          body: |
            ## Installation

            Download the binary for your platform and run it:
            ```bash
            chmod +x melody-*
            ./melody-linux-x86_64    # or your platform
            ```

            Optionally copy to your PATH:
            ```bash
            sudo cp melody-linux-x86_64 /usr/local/bin/melody
            ```

            ## Platforms
            - `melody-linux-x86_64`  - Linux (Intel/AMD 64-bit)
            - `melody-linux-aarch64` - Linux (ARM64, Raspberry Pi)
            - `melody-macos-x86_64`  - macOS (Intel)
            - `melody-macos-aarch64` - macOS (Apple Silicon)

            Sound needs `aplay` (alsa-utils), `play` (sox) or `paplay` on PATH.
